name: Build OpenWrt 25.12 Packages

on:
  workflow_dispatch:

env:
  OPENWRT_VER: 25.12.4
  GCC_VER: 14.3.0

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86/64
            platform: x86-64
            arch: x86-64

          - target: rockchip/armv8
            platform: rockchip-armv8
            arch: aarch64_cortex-a53

          - target: armsr/armv8
            platform: armsr-armv8
            arch: aarch64_generic

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses5-dev libssl-dev python3 unzip \
            file wget rsync zstd

      # =========================
      # Download SDK
      # =========================
      - name: Download OpenWrt SDK
        run: |
          SDK="openwrt-sdk-${OPENWRT_VER}-${{ matrix.platform }}_gcc-${GCC_VER}_musl.Linux-x86_64.tar.zst"
          URL="https://downloads.openwrt.org/releases/${OPENWRT_VER}/targets/${{ matrix.target }}/$SDK"

          echo "Downloading:"
          echo "$URL"

          wget -q "$URL" -O sdk.tar.zst
          tar --zstd -xf sdk.tar.zst
          mv openwrt-sdk-* sdk

      # =========================
      # Update feeds
      # =========================
      - name: Update feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install luci-app-run
          ./scripts/feeds install luci-i18n-run-zh-cn

      # =========================
      # Copy package
      # =========================
      - name: Copy luci-app-run
        run: |
          cp -r luci-app-run sdk/package/

      # =========================
      # Build
      # =========================
      - name: Build package
        run: |
          cd sdk
          make defconfig
          make package/luci-app-run/compile V=s -j$(nproc)

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          find sdk/bin -type f -name "luci-app-run*.apk" -print0 | while IFS= read -r -d '' file; do
            base=$(basename "$file" .apk)
            cp -v "$file" "dist/${base}-${{ matrix.arch }}.apk"
          done

      # =========================
      # Upload artifact
      # =========================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-run-${{ matrix.arch }}
          path: dist/

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist-all -type f -name "*.apk" -exec cp -v {} release/ \;

      - name: Create tag
        id: tag
        run: |
          echo "tag=v$(date -u +%Y.%m.%d)" >> "$GITHUB_OUTPUT"

      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: luci-app-run ${{ steps.tag.outputs.tag }}
          files: release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
